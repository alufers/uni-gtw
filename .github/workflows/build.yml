name: Build Firmware

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: main/web

      - name: TypeScript type check
        run: pnpm run typecheck
        working-directory: main/web

      - name: Lint (oxlint)
        run: pnpm run lint
        working-directory: main/web

      - name: Format check (oxfmt)
        run: pnpm run fmt:check
        working-directory: main/web

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: "v6.0.0"

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py build
